name: desktop-release
on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: arm64
          - os: macos-13
            arch: x64
          - os: windows-2022
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'desktop/package-lock.json'

      - name: Install Python deps + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[server]"
          pip install pyinstaller

      - name: Install npm deps
        working-directory: desktop
        run: npm ci

      - name: Build sidecar (bash)
        if: runner.os != 'Windows'
        working-directory: desktop
        run: bash scripts/build-sidecar.sh

      - name: Build sidecar (Windows — Git Bash)
        if: runner.os == 'Windows'
        working-directory: desktop
        shell: bash
        run: bash scripts/build-sidecar.sh

      - name: Build renderer + main
        working-directory: desktop
        run: npm run build

      - name: Package (mac)
        if: runner.os == 'macOS'
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --publish=always

      - name: Package (win)
        if: runner.os == 'Windows'
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish=always

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            desktop/dist-installer/*.dmg
            desktop/dist-installer/*.exe
            desktop/dist-installer/*.yml
          if-no-files-found: ignore
